<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IoT-Vas Login</title>

    <!-- update the version number as needed -->
    <script defer src="/__/firebase/10.4.0/firebase-app-compat.js"></script>
    <!-- include only the Firebase features as you need -->
    <script defer src="/__/firebase/10.4.0/firebase-auth-compat.js"></script>
    <script defer src="/__/firebase/10.4.0/firebase-database-compat.js"></script>
    <script defer src="/__/firebase/10.4.0/firebase-firestore-compat.js"></script>
    <script defer src="/__/firebase/10.4.0/firebase-functions-compat.js"></script>
    <script defer src="/__/firebase/10.4.0/firebase-messaging-compat.js"></script>
    <script defer src="/__/firebase/10.4.0/firebase-storage-compat.js"></script>
    <script defer src="/__/firebase/10.4.0/firebase-analytics-compat.js"></script>
    <script defer src="/__/firebase/10.4.0/firebase-remote-config-compat.js"></script>
    <script defer src="/__/firebase/10.4.0/firebase-performance-compat.js"></script>
    <!-- 
      initialize the SDK after all desired features are loaded, set useEmulator to false
      to avoid connecting the SDK to running emulators.
    -->
    <script defer src="/__/firebase/init.js?useEmulator=true"></script>

  </head>
  <body> 
    <h1>Login</h1>
    <form id="loginForm">
        <label for="email">Email:</label>
        <input type="email" id="email" required><br><br>
        <label for="password">Password:</label>
        <input type="password" id="password" required><br><br>
        <button type="submit">Login</button>
        <button id="goToResetPage">Reset Password</button> 
        <button id = 'goToSignUpPage'>Sign Up</button>
        <button id = 'gotolocalhost'>Local Host</button>
    </form>
      
    <script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-analytics.js";
  // Your web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  const firebaseConfig = {
    apiKey: "AIzaSyA0HOaNDLBvp3nj8sBcxnQ54w-x18aE7KE",
    authDomain: "iot-vas-4f9f5.firebaseapp.com",
    databaseURL: "https://iot-vas-4f9f5-default-rtdb.firebaseio.com",
    projectId: "iot-vas-4f9f5",
    storageBucket: "iot-vas-4f9f5.appspot.com",
    messagingSenderId: "860879711702",
    appId: "1:860879711702:web:4c6446ff1134eaea4a0877",
    measurementId: "G-MJK6VHERZG"
  };
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-auth.js";

  document.addEventListener('DOMContentLoaded', function() {
  const loginForm = document.getElementById('loginForm');
  const goToSignUpPageButton = document.getElementById('goToSignUpPage');
    
  goToSignUpPageButton.addEventListener('click', function(){
    window.location.href = 'signup.html';
  });

  loginForm.addEventListener('submit', (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    const auth = getAuth(); // Use getAuth here to get the authentication service

    signInWithEmailAndPassword(auth, email, password)
      .then(() => {
        window.location.href = 'main.html';  // Redirect to user-specific page
      })
      .catch((error) => {
        console.error('Error logging in:', error.message);
      });
  });
}); 
  document.addEventListener('DOMContentLoaded', function() {
  const goToResetPageButton = document.getElementById('goToResetPage');

  goToResetPageButton.addEventListener('click', function() {
    window.location.href = 'reset.html';
  });
});

document.addEventListener('DOMContentLoaded', function() {
  const gotolocalhost = document.getElementById('gotolocalhost');

  gotolocalhost.addEventListener('click', function() {
    window.location.href = 'https://localhost:8888';
  });
});
  </script>
   <style>
     body {
  font-family: Arial, sans-serif;
  background-color: #f5f5f5;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  flex-direction: column; /* Added to stack elements vertically */
}

.container {
  background-color: #ffffff;
  border: 1px solid #ccc;
  border-radius: 8px;
  padding: 20px;
  max-width: 400px;
  width: 100%;
  box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
}

h1 {
  text-align: center;
}

form {
  margin-bottom: 20px;
}

label {
  display: block;
  font-weight: bold;
  margin-bottom: 6px;
}

input {
  width: 100%;
  padding: 8px;
  margin-bottom: 12px;
  border: 1px solid #ccc;
  border-radius: 4px;
  box-sizing: border-box;
}

button {
  width: 100%;
  padding: 10px 20px;
  background-color: #ab3537;
  color: #fff;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: 16px;
}

button:hover {
  background-color: #b30015;
}

   </style>
  </body>
</html>
