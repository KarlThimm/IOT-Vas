  <script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-analytics.js";
  // Your web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  const firebaseConfig = {
    apiKey: "AIzaSyA0HOaNDLBvp3nj8sBcxnQ54w-x18aE7KE",
    authDomain: "iot-vas-4f9f5.firebaseapp.com",
    databaseURL: "https://iot-vas-4f9f5-default-rtdb.firebaseio.com",
    projectId: "iot-vas-4f9f5",
    storageBucket: "iot-vas-4f9f5.appspot.com",
    messagingSenderId: "860879711702",
    appId: "1:860879711702:web:4c6446ff1134eaea4a0877",
    measurementId: "G-MJK6VHERZG"
  };
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);

      document.addEventListener('DOMContentLoaded', function() {
  firebase.auth().onAuthStateChanged(function(user) {
    if (user) {
      const uid = user.uid;
      console.log('User ID:', uid);

      const userRef = firebase.database().ref(`users/${uid}/vulnerabilities`);
      userRef.once('value', (snapshot) => {
        const vulnerabilities = snapshot.val();

        const ctx = document.getElementById('vulnerabilityChart').getContext('2d');

        new Chart(ctx, {
          type: 'bar',
          data: {
            labels: Object.keys(vulnerabilities),
            datasets: [{
              label: 'Number of Vulnerabilities',
              data: Object.values(vulnerabilities),
              backgroundColor: ['blue', 'green']
            }]
          },
          options: {
            scales: {
              y: {
                beginAtZero: true
              }
            }
          }
        });
      });
    } else {
      console.log('No user is currently authenticated');
    }
  });
});
    </script>
