<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IOT-Vas Scanner</title>
    <!-- update the version number as needed -->
  </head>
<body>
    <header>
        <div class="top-bar">
            <div class="container">
                <div class="logo">IOT-Vas Logo
                </div>
                <nav class="navigation">
                    <ul>
                        <li><a href="page1.html">Page 1</a></li>
                        <li><a href="page2.html">Page 2</a></li>
                        <li><a href="page3.html">Page 3</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>
    <div class="widget-box">
        <h2>Widget Title</h2>
        <p>Widget content goes here.</p>
    </div>
    <!-- Main Content Goes Here -->
    <canvas id="vulnerabilityChart"></canvas>
    
</body>
</html>
  <script type="module">
  // Import the functions you need from the SDKs you need

      document.addEventListener('DOMContentLoaded', function() {
  firebase.auth().onAuthStateChanged(function(user) {
    if (user) {
      const uid = user.uid;
      console.log('User ID:', uid);

      const userRef = firebase.database().ref(`users/${uid}/vulnerabilities`);
      userRef.once('value', (snapshot) => {
        const vulnerabilities = snapshot.val();

        const ctx = document.getElementById('vulnerabilityChart').getContext('2d');

        new Chart(ctx, {
          type: 'bar',
          data: {
            labels: Object.keys(vulnerabilities),
            datasets: [{
              label: 'Number of Vulnerabilities',
              data: Object.values(vulnerabilities),
              backgroundColor: ['blue', 'green']
            }]
          },
          options: {
            scales: {
              y: {
                beginAtZero: true
              }
            }
          }
        });
      });
    } else {
      console.log('No user is currently authenticated');
    }
  });
});
    </script>
    <style>
