<!-- templates/scan.html -->

{% extends "base.html" %}

{% block headscripts %}
<script src="/static/script.js"></script>
{% endblock %}

{% block content %}
<div class="box">
  <button class="button" onclick="get_version()">Log version</button>
  <button class="button" onclick="get_scanners()">Log scanners</button>
  <button class="button" onclick="get_configs()">Log configs</button>
</div>
<div class="box">
  <div class="columns">
    <div class="column is-2">Scan 1</div>
    <div class="column"><progress class="progress" value="15" max="100">15%</progress></div>
  </div>
</div>
<div class="box">
  <div class="columns">
    <div class="column is-2">Scan 2</div>
    <div class="column"><progress class="progress" value="30" max="100">30%</progress></div>
  </div>
</div>

<div class="box">
<form id="createTargetForm">
    <h1>Create Target</h1>
    <label for="nameInput">Name:</label>
    <input type="text" id="nameInput" name="name"><br><br>
    
    <label for="hostInput">Hosts:</label>
    <input type="text" id="hostInput" name="hosts"><br><br>
    
    <!-- You can add input fields for port_list_id or port_range if required -->
    
    <button class='button' type="button" onclick="createTarget()">Create Target</button>
</div>
</form>

<div class='box'>
<h1>Create Task</h1>
    <label for="taskName">Task Name:</label>
    <input type="text" id="taskName" name="taskName"><br><br>

    <label for="configId">Select Configuration:</label>
    <select id="configId">
        <option value="daba56c8-73ec-11df-a475-002264764cea">Full and Fast</option>
        <option value="d21f6c81-2b88-4ac1-b7b4-a2a9f2ad4663">Base</option>
	<option value="8715c877-47a0-438d-98a3-27c7a6ab2196">Discovery</option>
	<option value="2d3f051c-55ba-11e3-bf43-406186ea4fc5">Host Discovery</option>
	<option value="e3efebc5-fc0d-4cb6-b1b4-55309d0a89f6">Log4Shell</option>
	<option value="bbca7412-a950-11e3-9109-406186ea4fc5">System Discovery</option>     
    </select><br><br>

    <label for="scannerId">Select Scanner:</label>
    <select id="scannerId">
        <option value="08b69003-5fc2-4037-a479-93b440211c73">OpenVAS Default</option>
	<option value="6acd0832-df90-11e4-b9d5-28d24461215b">CVE</option>	
    </select><br><br>
    <label for="targetId">Target ID:</label>
    <input type="text" id="targetId" name="targetId"><br><br>
    
    <button class='button' type="button" onclick="createTask()">Create Task</button><br><br>
</div>

<div class='box'>
    <h1>Start Task</h1>
    <label for="taskId">Task ID:</label>
    <input type="text" id="taskId" name="taskId"><br><br>
    <button class='button' type="button" onclick="startTask()">Start Task</button><br><br>
</div>

<div class='box'>
    <h1>Check Task Progress</h1><br>
    <label for="taskId">Task ID:</label><br><br>
    <input type="text" id="taskId" name="taskId"><br><br>
    <button class='button' type="button" onclick="checkTaskProgress()">Check Progress</button>
    <div id="progressOutput"></div>
</div>

<div class='box'>
    <label for="reportId">Enter Report ID:</label>
    <input type="text" id="reportId" name="reportId">
    <button class='button' onclick="getReportProgress()">Get Progress</button>
</div>

<div class='box'>
    <input type="text" id="reportId" placeholder="Enter Report ID">
    <button class='button' onclick="getReport()">Retrieve Report</button>
</div>
  
{% endblock %}
